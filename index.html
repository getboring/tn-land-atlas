<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#02040A" />

    <title>Holston Scout — Pre-construction Parcel Intelligence</title>
    <meta name="description" content="Pre-construction parcel intelligence for builders. Instant site feasibility, owner lookup, measurements, and zoning at the parcel level." />

    <link rel="canonical" href="https://tn-land-atlas.pages.dev/" />

    <!-- Open Graph (Facebook / Slack / iMessage / Discord previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Holston Scout — Pre-construction Parcel Intelligence" />
    <meta property="og:description" content="Scout the ground. Know the build. Pre-construction parcel research for builders." />
    <meta property="og:url" content="https://tn-land-atlas.pages.dev/" />
    <meta property="og:image" content="https://tn-land-atlas.pages.dev/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Holston Scout — Pre-construction Parcel Intelligence" />
    <meta name="twitter:description" content="Scout the ground. Know the build. Pre-construction parcel research for builders." />
    <meta name="twitter:image" content="https://tn-land-atlas.pages.dev/og-image.svg" />

    <!-- Holston Scout: Font Loading.
         One family across body + display, matches HolstonBuilder.
         Mono uses the system stack — no separate font load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

    <!-- DNS prefetch / preconnect for the upstreams the map talks to -->
    <link rel="preconnect" href="https://server.arcgisonline.com" crossorigin />
    <link rel="preconnect" href="https://gis.johnsoncitytn.org" crossorigin />
    <link rel="dns-prefetch" href="https://s3.amazonaws.com" />
  </head>
  <body>
    <!-- JS-disabled fallback. The app is a React SPA that cannot function
         without JavaScript; show a friendly message rather than a blank
         page. Styled inline so the dark-mode body background doesn't hide
         it before any CSS loads. -->
    <noscript>
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#02040A;color:#F8FAFC;font-family:system-ui,sans-serif;padding:2rem;text-align:center;">
        <div style="max-width:32rem;">
          <h1 style="font-size:1.5rem;margin:0 0 0.75rem;">Holston Scout needs JavaScript</h1>
          <p style="font-size:0.95rem;line-height:1.5;color:#94A3B8;margin:0;">
            This is an interactive parcel map. Enable JavaScript in your
            browser settings, then reload this page.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
