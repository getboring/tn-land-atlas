<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f172a" />

    <title>TN Land Atlas — Sullivan, Washington, Carter</title>
    <meta name="description" content="Real-estate parcel mapping for Sullivan, Washington, and Carter counties in East Tennessee. Search owners, addresses, parcel IDs. Live aerial imagery, topographic contours, lot measurements." />

    <link rel="canonical" href="https://tn-land-atlas.pages.dev/" />

    <!-- Open Graph (Facebook / Slack / iMessage / Discord previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TN Land Atlas" />
    <meta property="og:description" content="Parcel mapping for Sullivan, Washington, and Carter counties. Search owners, view sales history, measure lots." />
    <meta property="og:url" content="https://tn-land-atlas.pages.dev/" />
    <meta property="og:image" content="https://tn-land-atlas.pages.dev/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TN Land Atlas" />
    <meta name="twitter:description" content="Parcel mapping for Sullivan, Washington, and Carter counties." />
    <meta name="twitter:image" content="https://tn-land-atlas.pages.dev/og-image.svg" />

    <!-- DNS prefetch / preconnect for the upstreams the map talks to -->
    <link rel="preconnect" href="https://server.arcgisonline.com" crossorigin />
    <link rel="preconnect" href="https://gis.johnsoncitytn.org" crossorigin />
    <link rel="dns-prefetch" href="https://s3.amazonaws.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
